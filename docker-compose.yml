version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: datapivot-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - datapivot-network

  # Redis缓存
  redis:
    image: redis:6-alpine
    container_name: datapivot-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - datapivot-network

  # 后端API
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: datapivot-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DEBUG_MODE=${DEBUG_MODE}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DB=${MYSQL_DB}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./bank_statements:/app/bank_statements
    depends_on:
      - mysql
      - redis
    networks:
      - datapivot-network

  # Celery Worker
  celery:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: datapivot-celery
    restart: always
    command: celery -A backend.celery_app worker --loglevel=info
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DB=${MYSQL_DB}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./data:/app/data
    depends_on:
      - mysql
      - redis
    networks:
      - datapivot-network

  # 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: datapivot-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - datapivot-network

volumes:
  mysql_data:
  redis_data:

networks:
  datapivot-network:
    driver: bridge
